name: Build & Release

# Builds release binaries for Linux/macOS/Windows on Intel (x86_64) and Arm
# (aarch64), Debian/Ubuntu .deb packages (amd64 + arm64), RPM packages
# (x86_64 + aarch64), an npm package with all six platform binaries, the
# install.sh bootstrap script, plus multi-arch Docker images (linux/amd64,
# linux/arm64) pushed to GHCR.
#
# Triggers:
#   - push of a v* tag   -> builds everything, publishes a GitHub Release
#                           (tarballs + .deb + .rpm + install.sh), publishes
#                           to npm, and pushes :<tag> + :latest Docker images.
#   - workflow_dispatch  -> builds everything, pushes a :sha-<short> Docker image
#                           (no release/npm publish). Handy for testing from a branch.
#
# Secrets:
#   NPM_TOKEN  - npm automation token for publishing the llama-scale package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:


permissions:
  id-token: write  # Required for OIDC
  contents: write   # create GitHub Releases + upload assets
  packages: write   # push images to ghcr.io

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io

jobs:

  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux Intel
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            apt: ""
            linker: ""
            strip_cmd: strip
            binary: llama-scale
          # Linux Arm
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            apt: "gcc-aarch64-linux-gnu libc6-dev-arm64-cross"
            linker: "aarch64-linux-gnu-gcc"
            strip_cmd: aarch64-linux-gnu-strip
            binary: llama-scale
          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-15-intel
            apt: ""
            linker: ""
            strip_cmd: strip -x
            binary: llama-scale
          # macOS Apple Silicon (Arm)
          - target: aarch64-apple-darwin
            os: macos-14
            apt: ""
            linker: ""
            strip_cmd: strip -x
            binary: llama-scale
          # Windows Intel
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            apt: ""
            linker: ""
            strip_cmd: ""
            binary: llama-scale.exe
          # Windows Arm
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            apt: ""
            linker: ""
            strip_cmd: ""
            binary: llama-scale.exe
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross toolchain
        if: ${{ matrix.apt != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Configure cross-linker
        if: ${{ matrix.linker != '' }}
        run: |
          mkdir -p "$HOME/.cargo"
          {
            echo "[target.${{ matrix.target }}]"
            echo "linker = \"${{ matrix.linker }}\""
          } >> "$HOME/.cargo/config.toml"

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary
        if: ${{ matrix.strip_cmd != '' }}
        run: ${{ matrix.strip_cmd }} target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Package
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
            DEB_VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
            DEB_VERSION="0.0.0.dev.${GITHUB_SHA::7}"
          fi
          # tag/branch names may contain '/' -> make them filename-safe
          VERSION="${VERSION//\//-}"
          STAGE="llama-scale-${VERSION}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$STAGE/"
          cp config.example.yaml README.md "$STAGE/"
          tar czf "${STAGE}.tar.gz" -C "$STAGE" .
          echo "ASSET=${STAGE}.tar.gz" >> "$GITHUB_ENV"

          if [[ "${{ matrix.target }}" == *-linux-gnu ]]; then
            case "${{ matrix.target }}" in
              x86_64-unknown-linux-gnu)
                DEB_ARCH=amd64
                RPM_ARCH=x86_64
                ;;
              aarch64-unknown-linux-gnu)
                DEB_ARCH=arm64
                RPM_ARCH=aarch64
                ;;
            esac
            DEB_FILE="llama-scale_${DEB_VERSION}_${DEB_ARCH}.deb"
            packaging/debian/build-deb.sh \
              "${DEB_VERSION}" "${DEB_ARCH}" \
              "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
              "${DEB_FILE}"
            echo "DEB_ASSET=${DEB_FILE}" >> "$GITHUB_ENV"

            sudo apt-get update
            sudo apt-get install -y rpm
            RPM_FILE="llama-scale_${DEB_VERSION}_${RPM_ARCH}.rpm"
            packaging/rpm/build-rpm.sh \
              "${DEB_VERSION}" "${RPM_ARCH}" \
              "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
              "${RPM_FILE}"
            echo "RPM_ASSET=${RPM_FILE}" >> "$GITHUB_ENV"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: llama-scale-${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error
          retention-days: 14

      - uses: actions/upload-artifact@v7
        if: ${{ contains(matrix.target, 'linux-gnu') }}
        with:
          name: llama-scale-deb-${{ matrix.target }}
          path: ${{ env.DEB_ASSET }}
          if-no-files-found: error
          retention-days: 14

      - uses: actions/upload-artifact@v7
        if: ${{ contains(matrix.target, 'linux-gnu') }}
        with:
          name: llama-scale-rpm-${{ matrix.target }}
          path: ${{ env.RPM_ASSET }}
          if-no-files-found: error
          retention-days: 14

  docker:
    name: Docker image (linux/amd64 + linux/arm64)
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # QEMU is needed for the lightweight runtime stage (apt-get) when building
      # for arm64. The Rust compile itself is cross-compiled natively in the
      # builder stage (see Dockerfile), so emulation cost is negligible.
      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish GitHub Release
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all binary artifacts
        uses: actions/download-artifact@v7
        with:
          path: assets

      # install.sh is published as a fixed asset name so users can always:
      #   curl -fsSL .../releases/latest/download/install.sh | bash
      # VERSION_PIN inside the script is bumped with the rest of the project
      # via .bumpversion.cfg and must match the release tag.
      - name: Verify install.sh version pin
        run: |
          set -euo pipefail
          pin="$(sed -n 's/^VERSION_PIN="\([^"]*\)"/\1/p' install.sh | head -n1)"
          tag="${GITHUB_REF_NAME#v}"
          if [[ -z "${pin}" ]]; then
            echo "VERSION_PIN not found in install.sh" >&2
            exit 1
          fi
          if [[ "${pin}" != "${tag}" ]]; then
            echo "install.sh VERSION_PIN=${pin} does not match tag ${tag}" >&2
            echo "Run bumpversion before tagging so install.sh is updated." >&2
            exit 1
          fi
          echo "install.sh VERSION_PIN=${pin} matches release tag"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            assets/**/*.tar.gz
            assets/**/*.deb
            assets/**/*.rpm
            install.sh
          generate_release_notes: true

  publish-npm:
    name: Publish NPM package

    permissions:
      contents: read
      id-token: write
      packages: write
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all binary artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Setup Node.js for npm publishing
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          registry-url: https://registry.npmjs.org

      - name: Assemble and publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"
          export VERSION

          declare -A TARGETS=(
            [x86_64-unknown-linux-gnu]=llama-scale-x86_64-unknown-linux-gnu
            [aarch64-unknown-linux-gnu]=llama-scale-aarch64-unknown-linux-gnu
            [x86_64-apple-darwin]=llama-scale-x86_64-apple-darwin
            [aarch64-apple-darwin]=llama-scale-aarch64-apple-darwin
            [x86_64-pc-windows-msvc]=llama-scale-x86_64-pc-windows-msvc.exe
            [aarch64-pc-windows-msvc]=llama-scale-aarch64-pc-windows-msvc.exe
          )

          mkdir -p packaging/npm/vendor
          for target in "${!TARGETS[@]}"; do
            tarfile="$(find "artifacts/llama-scale-${target}" -name '*.tar.gz' -print -quit)"
            if [[ -z "${tarfile}" ]]; then
              echo "missing tarball artifact for ${target}" >&2
              exit 1
            fi
            tmpdir="$(mktemp -d)"
            tar -xzf "${tarfile}" -C "${tmpdir}"
            case "${target}" in
              *-pc-windows-msvc) bin_name="llama-scale.exe" ;;
              *) bin_name="llama-scale" ;;
            esac
            install -m 0755 "${tmpdir}/${bin_name}" "packaging/npm/vendor/${TARGETS[$target]}"
            rm -rf "${tmpdir}"
          done

          if [[ -z "${VERSION}" ]]; then
            echo "VERSION is empty; expected a v* tag ref, got: ${GITHUB_REF}" >&2
            exit 1
          fi

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packaging/npm/package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('packaging/npm/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          cd packaging/npm
          npm publish --provenance --access public
