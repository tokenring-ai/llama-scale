name: Build & Release

# Builds release binaries for Linux/macOS on Intel (x86_64) and Arm (aarch64),
# plus multi-arch Docker images (linux/amd64, linux/arm64) pushed to GHCR.
#
# Triggers:
#   - push of a v* tag   -> builds everything, publishes a GitHub Release and
#                           pushes :<tag> + :latest Docker images.
#   - workflow_dispatch  -> builds everything, pushes a :sha-<short> Docker image
#                           (no release). Handy for testing images from a branch.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # create GitHub Releases + upload assets
  packages: write   # push images to ghcr.io

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux Intel
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            apt: ""
            linker: ""
            strip_cmd: strip
          # Linux Arm
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            apt: "gcc-aarch64-linux-gnu"
            linker: "aarch64-linux-gnu-gcc"
            strip_cmd: aarch64-linux-gnu-strip
          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-13
            apt: ""
            linker: ""
            strip_cmd: strip -x
          # macOS Apple Silicon (Arm)
          - target: aarch64-apple-darwin
            os: macos-14
            apt: ""
            linker: ""
            strip_cmd: strip -x
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross toolchain
        if: ${{ matrix.apt != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Configure cross-linker
        if: ${{ matrix.linker != '' }}
        run: |
          mkdir -p "$HOME/.cargo"
          {
            echo "[target.${{ matrix.target }}]"
            echo "linker = \"${{ matrix.linker }}\""
          } >> "$HOME/.cargo/config.toml"

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary
        run: ${{ matrix.strip_cmd }} target/${{ matrix.target }}/release/llama-scale

      - name: Package
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          # tag/branch names may contain '/' -> make them filename-safe
          VERSION="${VERSION//\//-}"
          STAGE="llama-scale-${VERSION}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/llama-scale" "$STAGE/"
          cp config.example.yaml README.md "$STAGE/"
          tar czf "${STAGE}.tar.gz" -C "$STAGE" .
          echo "ASSET=${STAGE}.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: llama-scale-${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error
          retention-days: 14

  docker:
    name: Docker image (linux/amd64 + linux/arm64)
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU is needed for the lightweight runtime stage (apt-get) when building
      # for arm64. The Rust compile itself is cross-compiled natively in the
      # builder stage (see Dockerfile), so emulation cost is negligible.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish GitHub Release
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: assets/**/*.tar.gz
          generate_release_notes: true
