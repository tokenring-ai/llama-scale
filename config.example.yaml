# llama-scale configuration
#
# Run with:  llama-scale --config config.yaml
# Set secrets via environment variables and reference them as ${VAR}.

server:
  # Address to listen on.
  listen: "0.0.0.0:8080"
  # OpenAI-style bearer keys accepted from clients. Leave empty to DISABLE
  # authentication (open access) for local development.
  #
  # Simple form: a flat list of keys. Every key is equivalent and can call any
  # model with no concurrency cap.
  api_keys:
    - "sk-router-dev-key-change-me"
  #
  # Multi-user form: a map of key -> per-key settings. Each key can have its
  # own label (for logs), model allowlist, and concurrency cap.
  # api_keys:
  #   sk-alice-key:
  #     id: alice              # non-secret label used in access logs; defaults
  #                             # to a masked prefix of the key when omitted
  #     allowed_models:        # models this key may request; omit/empty = all
  #       - "gpt-4"
  #       - "llama-3*"         # trailing "*" matches by prefix
  #     concurrent_requests: 2 # max in-flight requests for this key; 0/omit = unlimited
  #   sk-bob-key:
  #     id: bob                # no allowed_models/concurrent_requests -> unrestricted

# Logging (applies to app logs AND HTTP request/access logs).
#   destination: "console" (stderr, default) or "file"
#   file:        path appended to when destination = file
#   level:       fallback level when RUST_LOG is unset (e.g. "info", "debug")
log:
  destination: "console"
  # file: "/var/log/llama-scale/access.log"
  # level: "info"

# How often (seconds) the merged /models list is rebuilt from all backends.
models_refresh_interval_secs: 30
# How often (seconds) each backend is probed for health.
health_check_interval_secs: 15
# Timeout (seconds) for a single health/model probe.
health_check_timeout_secs: 5
# Time-to-live (seconds) for session->backend affinity bindings.
session_ttl_secs: 3600
# Maximum number of session bindings kept in memory.
session_max_entries: 100000

# NOTE on `health_path`: it is host-root absolute — it replaces the path of the
# backend `url`. The default is `/v1/models` (works for any OpenAI-compatible
# server). For llama.cpp/ollama set it to the root `/health` endpoint.

backends:
  # --- Example 1: aliases ---
  # Only the alias names below are exposed and routable. Requests for the alias
  # are rewritten to the upstream "real" name before forwarding.
  - name: openai
    url: "https://api.openai.com/v1"
    api_key: "${OPENAI_API_KEY}"
    # Max wait for response headers (not the full stream body).
    timeout_secs: 120
    # Max silence between stream chunks; 0 disables. Default 120.
    # stream_idle_timeout_secs: 120
    # Max total stream body duration after headers; 0 = unlimited (default).
    # stream_timeout_secs: 0
    # Cap concurrent in-flight requests; 0 = unlimited (default).
    # max_connections: 0
    # fallback omitted -> defaults to 0 (preferred for new unpinned requests)
    # health_path omitted -> defaults to /v1/models
    model_aliases:
      - { alias: "gpt-latest", real: "gpt-5.5" }

  # --- Example 2: no aliases (serve everything as-is) ---
  # With no model_aliases, every model reported by the upstream /models is
  # exposed and routable under its original id.
  - name: llama
    url: "http://localhost:11434/v1"
    api_key: "my-llama-api-key"
    health_path: "/health"
    max_connections: 2  # protect a small local GPU from overload
    fallback: 1  # try this backend only when all fallback: 0 hosts are unavailable
